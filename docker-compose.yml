services:
  postgres:
    image: postgres:15
    container_name: postgres_dw
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banque_dw
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dw:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    image: python:3.12-slim
    container_name: etl_dw
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "pip install pandas psycopg2-binary -q &&
               python3 etl/etl_dw_bancaire.py --input data_brute --output data_transformee --host postgres &&
               python3 sql/setup_datamart.py --password postgres --host postgres"

  metabase:
    image: metabase/metabase
    container_name: metabase
    ports:
      - "3000:3000"
    depends_on:
      - etl

  cube:
    image: cubejs/cube:v1.6.64
    container_name: cube_finance
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DB_HOST: postgres
      CUBEJS_DB_PORT: 5432
      CUBEJS_DB_NAME: banque_dw
      CUBEJS_DB_USER: postgres
      CUBEJS_DB_PASS: postgres
      CUBEJS_DB_TYPE: postgres
      CUBEJS_API_SECRET: dev-secret
      CUBE_API_TOKEN: dev-token
      CUBEJS_DEV_MODE: "true"
      CUBEJS_SCHEMA_PATH: model
    volumes:
      - ./backend-finance:/cube/conf
      - cube_empty_deps:/cube/conf/node_modules/@cubejs-backend/
    depends_on:
      postgres:
        condition: service_healthy
      etl:
        condition: service_completed_successfully

  backend-api:
    image: node:22-alpine
    container_name: backend_finance_api
    working_dir: /app
    command: sh -c "npm run dev"
    env_file:
      - ./backend-finance/backend-api/.env
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      CUBE_API_URL: http://cube:4000/cubejs-api/v1
      CUBE_API_TOKEN: dev-token
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: banque_dw
    volumes:
      - ./backend-finance/backend-api:/app
    depends_on:
      - cube

  frontend:
    image: node:22-alpine
    container_name: agency_strategy_frontend
    working_dir: /app
    command: sh -c "npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_FINANCE_API_URL: http://localhost:5000
    volumes:
      - ./agency-strategy-tab-2:/app
    depends_on:
      - backend-api

volumes:
  pgdata_dw:
  cube_empty_deps:
